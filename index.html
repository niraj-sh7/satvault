<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Vault | </title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #09090b; --sidebar: #121214; --card: #18181b;
            --border: #27272a; --text: #fafafa; --text-dim: #a1a1aa;
            --accent: #3b82f6; --green: #22c55e; --red: #ef4444; --yellow: #eab308;
            --shaky: #6366f1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        aside { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent); letter-spacing: -1px; display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
        
        .timer-module { background: #3b82f610; border: 1px solid var(--accent); padding: 1.25rem; border-radius: 12px; text-align: center; }
        .timer-display { font-family: monospace; font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        .timer-btn { margin-top: 8px; background: var(--accent); border: none; color: white; padding: 6px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }

        .stat-card { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.5rem; }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-val { font-weight: 700; font-size: 1rem; }
        .streak-fire { color: #f97316; display: flex; align-items: center; gap: 5px; }

        main { flex: 1; padding: 2.5rem; overflow-y: auto; position: relative; }
        .input-bar { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 1rem; margin-bottom: 2rem; }
        input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.7rem 1rem; border-radius: 8px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); }

        .heatmap-section { background: var(--card); border: 1px solid var(--border); padding: 1.25rem; border-radius: 12px; margin-bottom: 2rem; }
        .heatmap { display: flex; gap: 3px; overflow-x: auto; padding-bottom: 5px; }
        .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
        .day-cell { width: 11px; height: 11px; border-radius: 2px; background: var(--border); position: relative; }
        
        .question-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
        .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; position: relative; border-left: 6px solid var(--border); }
        .q-card.status-correct { border-left-color: var(--green); }
        .q-card.status-shaky { border-left-color: var(--shaky); }
        .q-card.status-silly { border-left-color: var(--yellow); }
        .q-card.status-wrong { border-left-color: var(--red); }

        .status-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; }
        .s-btn { border: none; height: 28px; border-radius: 4px; cursor: pointer; opacity: 0.2; transition: 0.2s; font-size: 0.65rem; font-weight: bold; color: white; }
        .s-btn.active { opacity: 1; }
        .bg-g { background: var(--green); } .bg-b { background: var(--shaky); } .bg-y { background: var(--yellow); } .bg-r { background: var(--red); }

        .insight-box { background: #3b82f615; border: 1px solid var(--accent); padding: 1.25rem; border-radius: 12px; margin-bottom: 2rem; color: var(--accent); }

        .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text-dim); cursor: pointer; }
    </style>
</head>
<body>

<aside>
    <div class="logo"><i data-lucide="crosshair"></i> SAT VAULT</div>

    <div class="timer-module">
        <div class="timer-display" id="timer">00:00:00</div>
        <button class="timer-btn" onclick="toggleTimer()" id="timerCtrl">Start Session</button>
    </div>

    <div class="nav-stats">
        <div class="stat-card">
            <span class="stat-label">Accuracy</span>
            <span class="stat-val" id="accVal">0%</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Daily Goal</span>
            <span class="stat-val" id="goalVal">0 / 20</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Streak</span>
            <span class="stat-val streak-fire"><i data-lucide="flame" size="16"></i> <span id="streakVal">0 Days</span></span>
        </div>
    </div>

    <div style="margin-top:auto">
        <button onclick="exportData()" class="timer-btn" style="background:var(--border)">Export Backup</button>
    </div>
</aside>

<main>
    <div class="insight-box" id="aiInsight">
        <strong>Pattern Analysis:</strong> Add questions to start seeing performance insights.
    </div>

    <div class="input-bar">
        <input type="text" id="newId" placeholder="Question ID (e.g. 8f2b31)">
        <select id="newDomain">
            <option value="Algebra">Math: Algebra</option>
            <option value="Advanced Math">Math: Advanced Math</option>
            <option value="Problem Solving">Math: Problem Solving</option>
            <option value="Geometry">Math: Geometry & Trig</option>
            <option value="Craft">R&W: Craft & Structure</option>
            <option value="Ideas">R&W: Information & Ideas</option>
            <option value="Expression">R&W: Expression of Ideas</option>
            <option value="Conventions">R&W: Standard Conventions</option>
        </select>
        <button class="timer-btn" onclick="addQuestion()" style="width:100px; margin:0">Add ID</button>
    </div>

    <div class="heatmap-section">
        <div class="stat-label" style="margin-bottom:10px">Activity Heatmap</div>
        <div class="heatmap" id="heatmap"></div>
    </div>

    <div class="question-grid" id="qGrid"></div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('sat_vault_final')) || { questions: [] };
    let seconds = 0;
    let timerInt;

    function save() {
        localStorage.setItem('sat_vault_final', JSON.stringify(db));
        render();
        updateStats();
    }

    function addQuestion() {
        const id = document.getElementById('newId').value.trim();
        const domain = document.getElementById('newDomain').value;
        if(!id) return;
        
        db.questions.unshift({
            id: id,
            domain: domain,
            status: '',
            note: '',
            date: new Date().toISOString().split('T')[0]
        });
        
        document.getElementById('newId').value = '';
        save();
    }

    function updateStatus(index, status) {
        db.questions[index].status = (db.questions[index].status === status) ? '' : status;
        save();
    }

    function updateNote(index, text) {
        db.questions[index].note = text;
        save();
    }

    function deleteQ(index) {
        if(confirm('Remove ID?')) {
            db.questions.splice(index, 1);
            save();
        }
    }

    function updateStats() {
        const today = new Date().toISOString().split('T')[0];
        const doneToday = db.questions.filter(q => q.date === today).length;
        document.getElementById('goalVal').innerText = `${doneToday} / 20`;

        // Accuracy
        const scored = db.questions.filter(q => q.status !== '');
        const correct = scored.filter(q => q.status === 'correct' || q.status === 'shaky').length;
        document.getElementById('accVal').innerText = scored.length > 0 ? Math.round((correct/scored.length)*100)+'%' : '0%';

        // Streak
        let streak = 0;
        let d = new Date();
        while(true) {
            let key = d.toISOString().split('T')[0];
            if(db.questions.some(q => q.date === key)) {
                streak++;
                d.setDate(d.getDate() - 1);
            } else break;
        }
        document.getElementById('streakVal').innerText = `${streak} Days`;

        // AI Dynamic Insights
        let errorMap = {};
        db.questions.forEach(q => {
            if(q.status === 'wrong' || q.status === 'silly') {
                errorMap[q.domain] = (errorMap[q.domain] || 0) + 1;
            }
        });
        const worst = Object.entries(errorMap).sort((a,b) => b[1]-a[1])[0];
        if(worst) {
            document.getElementById('aiInsight').innerHTML = `<strong>Strategic Alert:</strong> You have the highest error density in <strong>${worst[0]}</strong>. Review your "Silly" mistakes here to immediately boost your score.`;
        }

        renderHeatmap();
    }

    function renderHeatmap() {
        const h = document.getElementById('heatmap');
        h.innerHTML = '';
        const today = new Date();
        for(let i=0; i<35; i++) {
            const col = document.createElement('div');
            col.className = 'heatmap-col';
            for(let j=0; j<7; j++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                const d = new Date();
                d.setDate(today.getDate() - (35-i)*7 + (6-j));
                const key = d.toISOString().split('T')[0];
                const count = db.questions.filter(q => q.date === key).length;
                if(count > 0) cell.style.background = `rgba(34, 197, 94, ${Math.min(0.2 + (count*0.15), 1)})`;
                col.appendChild(cell);
            }
            h.appendChild(col);
        }
    }

    function render() {
        const grid = document.getElementById('qGrid');
        grid.innerHTML = '';
        db.questions.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = `q-card status-${q.status}`;
            card.innerHTML = `
                <button class="delete-btn" onclick="deleteQ(${i})"><i data-lucide="trash-2" size="14"></i></button>
                <div style="font-size: 0.7rem; color: var(--text-dim)">${q.domain}</div>
                <div style="font-weight: 800; font-family: monospace; font-size: 1.1rem; margin-top:4px">#${q.id}</div>
                <div class="status-btns">
                    <button class="s-btn bg-g ${q.status==='correct'?'active':''}" onclick="updateStatus(${i}, 'correct')">Correct</button>
                    <button class="s-btn bg-b ${q.status==='shaky'?'active':''}" onclick="updateStatus(${i}, 'shaky')">Shaky</button>
                    <button class="s-btn bg-y ${q.status==='silly'?'active':''}" onclick="updateStatus(${i}, 'silly')">Silly</button>
                    <button class="s-btn bg-r ${q.status==='wrong'?'active':''}" onclick="updateStatus(${i}, 'wrong')">Wrong</button>
                </div>
                <textarea class="timer-btn" style="background:var(--bg); border:1px solid var(--border); color:var(--text); text-align:left; font-weight:normal; font-size:0.8rem; height:50px; margin-top:10px" onchange="updateNote(${i}, this.value)" placeholder="Explain logic...">${q.note}</textarea>
            `;
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    function toggleTimer() {
        const btn = document.getElementById('timerCtrl');
        if(timerInt) { clearInterval(timerInt); timerInt = null; btn.innerText = "Resume"; }
        else {
            timerInt = setInterval(() => {
                seconds++;
                const h = Math.floor(seconds/3600).toString().padStart(2,'0');
                const m = Math.floor((seconds%3600)/60).toString().padStart(2,'0');
                const s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
            btn.innerText = "Pause";
        }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'sat_vault_export.json'; a.click();
    }

    updateStats();
    render();
</script>
</body>
</html>
